{% extends 'base.html' %}
{% block content %}
<div class="auth-container">

    <div class="auth-card">

        <h2>Criar Conta</h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="auth-btn">
                Criar Conta
            </button>

        </form>

        <p class="auth-switch">
            Já possui uma conta?
            <a href="{% url 'profile:login' %}">
                Entrar
            </a>
        </p>

    </div>

</div>
{% endblock %}
