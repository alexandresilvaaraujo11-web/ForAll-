{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat do Fórum - Conecta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Fundo escuro sutil usando o tom de base da logo */
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #ffffff;
            color: #0d2343; /* Azul escuro da logo */
            padding: 18px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #e9ecef;
            letter-spacing: 0.5px;
        }

        .messages-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background-color: #f8f9fa; 
        }
        .message-card {
            background-color: #ffffff;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(13, 35, 67, 0.06);
            max-width: 85%;
            align-self: flex-start;
            border-left: 4px solid #1a519d; /* Detalhe lateral no azul da marca */
        }

        .message-user {
            font-size: 0.9rem;
            font-weight: bold;
            /* ALTERADO: Cor do nome agora é preta */
            color: #000000;
            margin-bottom: 5px;
        }

        .message-text {
            font-size: 0.95rem;
            color: #212529;
            line-height: 1.4;
            word-break: break-word;
        }

        .chat-form {
            padding: 20px;
            background-color: #ffffff;
            border-top: 1px solid #ced4da;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"], textarea {
            padding: 12px 16px;
            border: 1.5px solid #ced4da;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            color: #0d2343;
            background-color: #f8f9fa;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #1a519d;
            background-color: #ffffff;
        }

        textarea {
            resize: none;
            height: 46px;
            flex: 1;
        }

      
        .btn-send {
            background-color: #0d2343;
            color: #ffffff;
            border: none;
            padding: 0 24px;
            height: 46px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-send:hover {
            background-color: #1a519d;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            Chat do Fórum
        </div>

        <div class="messages-box">
            {% for mensagem in mensagens %}
                <div class="message-card">
                    <div class="message-user">{{ mensagem.nome }}</div>
                    <div class="message-text">{{ mensagem.texto }}</div>
                </div>
            {% empty %}
                <div style="color: #6c757d; text-align: center; margin-top: 30px; font-style: italic;">
                    Nenhuma mensagem enviada ainda.
                </div>
            {% endfor %}
        </div>

        <form method="POST" class="chat-form">
            {% csrf_token %}
            <div class="form-row">
                <input type="text" name="nome" placeholder="Seu nome" required style="max-width: 140px;">
                <textarea name="texto" placeholder="Digite sua mensagem..." required></textarea>
                <button type="submit" class="btn-send">Enviar</button>
            </div>
        </form>
    </div>

</body>
</html>
