<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fórum de Projetos</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #333; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card h2 { margin-top: 0; color: #007bff; }
        .info { color: #666; font-size: 14px; margin-bottom: 10px; }
        .desc { color: #444; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Projetos Cadastrados</h1>
        
        {% for projeto in projetos %}
            <div class="card">
                <h2>{{ projeto.titulo }}</h2>
                <div class="info">
                    <strong>Curso:</strong> {{ projeto.curso }} | 
                    <strong>Criado por:</strong> {{ projeto.criador_nome }}
                </div>
                <p class="desc">{{ projeto.descricao }}</p>
            </div>
        {% empty %}
            <p style="text-align: center; color: #999;">Nenhum projeto cadastrado ainda.</p>
        {% endfor %}
    </div>
</body>
</html>
