{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForAll - Fórum Acadêmico</title>
    <!--    CSS    -->
    <link rel ="stylesheet" href ="{% static 'css/style.css' %}">
    <!--    JS      -->
    <script src="{% static 'scripts/scripts.js' %}"></script>
    <!--    Logo Google     -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <header>
  <div class="header-inner">
    <!-- Logo -->
    <a href="{% url 'lista_projetos' %}" class="logo">
      <div class="logo-icon">F</div>
      <span class="logo-name">ForAll</span>
      <span class="logo-tag">Fórum Acadêmico</span>
    </a>
    <!-- Auth + CTA (desktop) -->
   <div class="nav-links">
      <div class="nav-divider" aria-hidden="true"></div>
      
      {% if user.is_authenticated %}
        <a class="btn-logout" href="{% url 'profile:logout_profile' %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </a>
      {% else %}
        <a class="btn-ghost" href="{% url 'profile:login' %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Entrar
        </a>
        <a class="btn-primary" href="{% url 'profile:register' %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          <span>Criar conta</span>
        </a>
      {% endif %}
    </div>

    <!-- Hamburger (mobile) -->
    <button class="hamburger" id="hamburger" aria-label="Abrir menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="{% url 'lista_projetos' %}" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Projetos
    </a>
    
    {% if user.is_authenticated %}
    <a class="btn-logout" href="{% url 'profile:logout_profile' %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        
        Sair</a>
    {% else %}
      <a class="btn-ghost" href="{% url 'profile:login' %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Entrar

      </a>
      <a class="btn-primary" href="{% url 'profile:register' %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        <span>
        Criar conta
      </span></a>
    {% endif %}
  </div>


<nav class="bottom-nav">
  <hr style="opacity: 10%;">
    <div class="bottom-nav-container">
      <a href="{% url 'lista_projetos' %}" class="nav-link {% if request.path == '/' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Projetos
      </a>
    </div>
    

  </nav>
</header>


<main>
    {% block content %}{% endblock %}
</main>


<footer class="footer">
  <p>© 2026 ForAll</p>
</footer>
    
</body>
</html>
